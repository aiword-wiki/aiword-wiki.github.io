<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Wiki</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #F3F0EB;
    color: #4a4540;
    min-height: 100vh;
  }

  /* Header */
  header {
    position: sticky; top:0; z-index:50;
    background: rgba(243,240,235,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid #ddd8d0;
    padding: 16px 32px;
    display: flex; align-items: center; gap: 24px;
  }

  .logo { font-size: 20px; font-weight: 900; color: #C4613A; letter-spacing: -0.5px; flex-shrink:0; }

  input {
    flex:1; max-width: 360px;
    padding: 8px 16px;
    background: #fff;
    border: 1px solid #d5d0c8;
    border-radius: 8px;
    color: #2d2a26;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  input::placeholder { color: #aaa598; }
  input:focus { border-color: #C4613A; }

  .filters {
    display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto;
  }

  .f {
    padding: 5px 14px;
    background: transparent;
    border: 1px solid #d5d0c8;
    border-radius: 20px;
    color: #8a8478;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
  }
  .f:hover { border-color: #b0a898; color: #5a5550; }
  .f.on { border-color: #C4613A; color: #C4613A; background: rgba(196,97,58,0.06); }

  /* Grid */
  .grid {
    max-width: 1400px;
    margin: 32px auto;
    padding: 0 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  /* Card */
  .card {
    position: relative;
    background: #fff;
    border: 1px solid #e4dfd8;
    border-radius: 14px;
    padding: 24px;
    min-height: 200px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .card:hover {
    background: #fdfcfa;
    border-color: #c8c0b8;
  }

  .card-cat {
    position: absolute;
    top: 16px; left: 20px;
    font-size: 11px;
    color: #a09888;
  }

  .card-heat {
    position: absolute;
    top: 14px; right: 18px;
    font-size: 13px;
  }

  .card-keyword {
    font-size: 24px;
    font-weight: 900;
    color: #2d2a26;
    line-height: 1.3;
    letter-spacing: -0.3px;
    text-align: center;
  }

  /* Heat dots */
  .card-heat {
    position: absolute;
    top: 16px; right: 18px;
    display: flex;
    gap: 4px;
  }

  .heat-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ddd8d0;
  }

  .heat-dot.on { background: #C4613A; }

  /* No results */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 100px 20px;
    color: #a09888;
    font-size: 15px;
  }

  /* Modal */
  .overlay {
    display:none; position:fixed; inset:0;
    background: rgba(40,36,32,0.4);
    backdrop-filter: blur(10px);
    z-index:100;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 20px;
    overflow-y: auto;
  }
  .overlay.open { display:flex; }

  .modal {
    background: #fff;
    border: 1px solid #e4dfd8;
    border-radius: 16px;
    max-width: 640px;
    width: 100%;
    padding: 36px;
    animation: up 0.15s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.1);
  }

  @keyframes up { from { opacity:0; transform:translateY(12px); } }

  .modal-close {
    float: right;
    background: none; border: none;
    color: #aaa598; font-size: 20px;
    cursor: pointer;
    padding: 4px;
  }
  .modal-close:hover { color: #6a6560; }

  .modal-cat { font-size: 12px; color: #a09888; margin-bottom: 8px; }
  .modal-title { font-size: 30px; font-weight: 900; color: #2d2a26; margin-bottom: 4px; letter-spacing: -0.5px; }
  .modal-en { font-size: 13px; color: #a09888; margin-bottom: 16px; }

  .modal-heat {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 20px; padding-bottom: 20px;
    border-bottom: 1px solid #e8e4de;
    font-size: 13px; color: #8a8478;
  }

  .modal-heat .pips { display:flex; gap:3px; }
  .modal-heat .pip { width:18px; height:5px; border-radius:3px; background:#e8e4de; }
  .modal-heat .pip.on { background: #C4613A; }

  .modal-body p { font-size: 14px; color: #5a5550; line-height: 1.8; margin-bottom: 12px; }
  .modal-body h4 { font-size: 14px; font-weight: 700; color: #2d2a26; margin: 20px 0 8px; }
  .modal-body h4:first-child { margin-top: 0; }
  .modal-body ul { padding-left: 18px; margin: 6px 0; }
  .modal-body li { font-size: 13.5px; color: #6a6560; line-height: 1.7; margin-bottom: 3px; }
  .modal-body code { font-family: monospace; background: rgba(196,97,58,0.08); padding: 1px 5px; border-radius: 3px; font-size: 12px; color: #C4613A; }
  .modal-body pre { background: #F3F0EB; border: 1px solid #e4dfd8; border-radius: 8px; padding: 14px; overflow-x:auto; margin: 10px 0; }
  .modal-body pre code { background:none; padding:0; font-size:12.5px; color:#4a4540; }

  .modal-related { margin-top: 24px; padding-top: 20px; border-top: 1px solid #e8e4de; }
  .modal-related h4 { margin-top: 0; }
  .rel-links { display:flex; flex-wrap:wrap; gap:8px; }
  .rel-link { font-size:13px; padding:6px 14px; border-radius:8px; background:#F3F0EB; color:#6a6560; cursor:pointer; border:1px solid #e4dfd8; }
  .rel-link:hover { background:#e8e4de; color:#2d2a26; }

  .modal-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:20px; }
  .modal-tags span { font-size:11px; padding:3px 9px; border-radius:12px; background:#F3F0EB; color:#8a8478; cursor:pointer; }
  .modal-tags span:hover { color:#C4613A; }

  @media (max-width:700px) {
    header { flex-wrap:wrap; padding:12px 16px; }
    input { max-width:100%; order:10; flex-basis:100%; }
    .filters { order:11; width:100%; }
    .grid { padding:0 12px; margin:16px auto; grid-template-columns:1fr; }
    .card { min-height:160px; padding:24px 20px; }
    .card-keyword { font-size:22px; }
    .modal { padding:24px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">AI Wiki</div>

</header>

<div class="grid" id="grid"></div>

<div class="overlay" id="ov">
  <div class="modal" id="modal"></div>
</div>

// State
let cat = 'all', q = '';

function render() {
  let list = D.filter(e => {
    if (cat !== 'all' && e.c !== cat) return false;
    if (!q) return true;
    const s = q.toLowerCase();
    return e.t.toLowerCase().includes(s) || e.en.toLowerCase().includes(s) || e.tags.some(t=>t.includes(s));
  }).sort((a,b) => b.h - a.h || a.t.localeCompare(b.t));

  const g = document.getElementById('grid');
  if (!list.length) { g.innerHTML = '<div class="empty">검색 결과 없음</div>'; return; }

  g.innerHTML = list.map(e => {
    const dots = [1,2,3,4,5].map(i => `<div class="heat-dot${i<=e.h?' on':''}"></div>`).join('');
    return `<div class="card" onclick="open_m('${e.id}')">
      <div class="card-cat">${CATS[e.c]}</div>
      <div class="card-heat">${dots}</div>
      <div class="card-keyword">${e.t}</div>
    </div>`;
  }).join('');
}

// Filters
(function(){
  const f = document.getElementById('filters');
  f.innerHTML = `<button class="f on" data-c="all">전체</button>` +
    Object.entries(CATS).map(([k,v])=>`<button class="f" data-c="${k}">${v}</button>`).join('');
  f.addEventListener('click', e => {
    const b = e.target.closest('.f');
    if (!b) return;
    f.querySelectorAll('.f').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    cat = b.dataset.c;
    render();
  });
})();

// Search
document.getElementById('q').addEventListener('input', e => { q = e.target.value.trim(); render(); });

// Modal
function open_m(id) {
  const e = D.find(x=>x.id===id);
  if (!e) return;
  const rels = (e.rel||[]).map(r=>D.find(x=>x.id===r)).filter(Boolean);
  document.getElementById('modal').innerHTML = `
    <button class="modal-close" onclick="close_m()">✕</button>
    <div class="modal-cat">${CATS[e.c]}</div>
    <div class="modal-title">${e.t}</div>
    <div class="modal-en">${e.en}</div>
    <div class="modal-heat">
      <span>Heat</span>
      <div class="pips">${[1,2,3,4,5].map(i=>`<div class="pip${i<=e.h?' on':''}"></div>`).join('')}</div>
      <span>${HEAT[e.h]}</span>
    </div>
    <div class="modal-body"><p>${e.sum}</p>${e.det}</div>
    ${e.tags.length?`<div class="modal-tags">${e.tags.map(t=>`<span onclick="document.getElementById('q').value='${t}';q='${t}';close_m();render()">#${t}</span>`).join('')}</div>`:''}
    ${rels.length?`<div class="modal-related"><h4>관련 키워드</h4><div class="rel-links">${rels.map(r=>`<span class="rel-link" onclick="open_m('${r.id}')">${r.t}</span>`).join('')}</div></div>`:''}
  `;
  document.getElementById('ov').classList.add('open');
  document.body.style.overflow='hidden';
}

function close_m() {
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('ov').addEventListener('click', e => { if(e.target===e.currentTarget) close_m(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') close_m(); });

render();
</script>
