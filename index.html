<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Wiki</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #F3F0EB;
    color: #4a4540;
    min-height: 100vh;
  }

  /* Header */
  header {
    position: sticky; top:0; z-index:50;
    background: rgba(243,240,235,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid #ddd8d0;
    padding: 16px 32px;
    display: flex; align-items: center; gap: 24px;
  }

  .logo { font-size: 20px; font-weight: 900; color: #C4613A; letter-spacing: -0.5px; flex-shrink:0; }

  input {
    flex:1; max-width: 360px;
    padding: 8px 16px;
    background: #fff;
    border: 1px solid #d5d0c8;
    border-radius: 8px;
    color: #2d2a26;
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  input::placeholder { color: #aaa598; }
  input:focus { border-color: #C4613A; }

  .filters {
    display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto;
  }

  .f {
    padding: 5px 14px;
    background: transparent;
    border: 1px solid #d5d0c8;
    border-radius: 20px;
    color: #8a8478;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
  }
  .f:hover { border-color: #b0a898; color: #5a5550; }
  .f.on { border-color: #C4613A; color: #C4613A; background: rgba(196,97,58,0.06); }

  /* Grid */
  .grid {
    max-width: 1400px;
    margin: 32px auto;
    padding: 0 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  /* Card */
  .card {
    position: relative;
    background: #fff;
    border: 1px solid #e4dfd8;
    border-radius: 14px;
    padding: 24px;
    min-height: 200px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .card:hover {
    background: #fdfcfa;
    border-color: #c8c0b8;
  }

  .card-cat {
    position: absolute;
    top: 16px; left: 20px;
    font-size: 11px;
    color: #a09888;
  }

  .card-heat {
    position: absolute;
    top: 14px; right: 18px;
    font-size: 13px;
  }

  .card-keyword {
    font-size: 24px;
    font-weight: 900;
    color: #2d2a26;
    line-height: 1.3;
    letter-spacing: -0.3px;
    text-align: center;
  }

  /* Heat dots */
  .card-heat {
    position: absolute;
    top: 16px; right: 18px;
    display: flex;
    gap: 4px;
  }

  .heat-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ddd8d0;
  }

  .heat-dot.on { background: #C4613A; }

  /* No results */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 100px 20px;
    color: #a09888;
    font-size: 15px;
  }

  /* Modal */
  .overlay {
    display:none; position:fixed; inset:0;
    background: rgba(40,36,32,0.4);
    backdrop-filter: blur(10px);
    z-index:100;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 20px;
    overflow-y: auto;
  }
  .overlay.open { display:flex; }

  .modal {
    background: #fff;
    border: 1px solid #e4dfd8;
    border-radius: 16px;
    max-width: 640px;
    width: 100%;
    padding: 36px;
    animation: up 0.15s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.1);
  }

  @keyframes up { from { opacity:0; transform:translateY(12px); } }

  .modal-close {
    float: right;
    background: none; border: none;
    color: #aaa598; font-size: 20px;
    cursor: pointer;
    padding: 4px;
  }
  .modal-close:hover { color: #6a6560; }

  .modal-cat { font-size: 12px; color: #a09888; margin-bottom: 8px; }
  .modal-title { font-size: 30px; font-weight: 900; color: #2d2a26; margin-bottom: 4px; letter-spacing: -0.5px; }
  .modal-en { font-size: 13px; color: #a09888; margin-bottom: 16px; }

  .modal-heat {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 20px; padding-bottom: 20px;
    border-bottom: 1px solid #e8e4de;
    font-size: 13px; color: #8a8478;
  }

  .modal-heat .pips { display:flex; gap:3px; }
  .modal-heat .pip { width:18px; height:5px; border-radius:3px; background:#e8e4de; }
  .modal-heat .pip.on { background: #C4613A; }

  .modal-body p { font-size: 14px; color: #5a5550; line-height: 1.8; margin-bottom: 12px; }
  .modal-body h4 { font-size: 14px; font-weight: 700; color: #2d2a26; margin: 20px 0 8px; }
  .modal-body h4:first-child { margin-top: 0; }
  .modal-body ul { padding-left: 18px; margin: 6px 0; }
  .modal-body li { font-size: 13.5px; color: #6a6560; line-height: 1.7; margin-bottom: 3px; }
  .modal-body code { font-family: monospace; background: rgba(196,97,58,0.08); padding: 1px 5px; border-radius: 3px; font-size: 12px; color: #C4613A; }
  .modal-body pre { background: #F3F0EB; border: 1px solid #e4dfd8; border-radius: 8px; padding: 14px; overflow-x:auto; margin: 10px 0; }
  .modal-body pre code { background:none; padding:0; font-size:12.5px; color:#4a4540; }

  .modal-related { margin-top: 24px; padding-top: 20px; border-top: 1px solid #e8e4de; }
  .modal-related h4 { margin-top: 0; }
  .rel-links { display:flex; flex-wrap:wrap; gap:8px; }
  .rel-link { font-size:13px; padding:6px 14px; border-radius:8px; background:#F3F0EB; color:#6a6560; cursor:pointer; border:1px solid #e4dfd8; }
  .rel-link:hover { background:#e8e4de; color:#2d2a26; }

  .modal-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:20px; }
  .modal-tags span { font-size:11px; padding:3px 9px; border-radius:12px; background:#F3F0EB; color:#8a8478; cursor:pointer; }
  .modal-tags span:hover { color:#C4613A; }

  .modal-refs { margin-top: 20px; padding-top: 16px; border-top: 1px solid #e8e4de; }
  .modal-refs h4 { font-size: 13px; font-weight: 700; color: #2d2a26; margin: 0 0 10px; }
  .modal-refs a { display:block; font-size:13px; color:#C4613A; text-decoration:none; padding:4px 0; line-height:1.5; }
  .modal-refs a:hover { text-decoration:underline; }
  .modal-refs .ref-type { font-size:10px; color:#a09888; background:#F3F0EB; padding:1px 6px; border-radius:4px; margin-left:6px; vertical-align:middle; }

  .modal-videos { margin-top: 16px; }
  .modal-videos h4 { font-size: 13px; font-weight: 700; color: #2d2a26; margin: 0 0 10px; }
  .modal-videos a { display:flex; align-items:center; gap:8px; font-size:13px; color:#5a5550; text-decoration:none; padding:6px 0; }
  .modal-videos a:hover { color:#C4613A; }
  .modal-videos .yt-icon { color:#C4613A; font-size:14px; flex-shrink:0; }
  .modal-videos .vid-lang { font-size:10px; color:#a09888; background:#F3F0EB; padding:1px 6px; border-radius:4px; }

  @media (max-width:700px) {
    header { flex-wrap:wrap; padding:12px 16px; }
    input { max-width:100%; order:10; flex-basis:100%; }
    .filters { order:11; width:100%; }
    .grid { padding:0 12px; margin:16px auto; grid-template-columns:1fr; }
    .card { min-height:160px; padding:24px 20px; }
    .card-keyword { font-size:22px; }
    .modal { padding:24px 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">AI Wiki</div>
  <input type="text" id="q" placeholder="검색..." autocomplete="off">
  <div class="filters" id="filters"></div>
</header>

<div class="grid" id="grid"></div>

<div class="overlay" id="ov">
  <div class="modal" id="modal"></div>
</div>

<script>
const CATS = {
  prompting:'프롬프팅', model:'모델', tooling:'도구',
  data:'데이터', agent:'에이전트', infra:'인프라',
  safety:'안전', application:'응용'
};

const HEAT = ['','Cool','Mild','Warm','Hot','Blazing'];

const D = [
  {id:'harness-engineering',t:'하네스 엔지니어링',en:'Harness Engineering',c:'prompting',h:5,tags:['시스템설계','오케스트레이션'],
   sum:'AI 에이전트를 실제 프로덕션 환경에서 신뢰할 수 있도록 만드는 시스템 설계 규율로, 모델 자체보다 모델을 감싸는 구조가 성능을 결정한다.',
   det:`<h4>하네스 엔지니어링이란 무엇인가</h4><p>하네스 엔지니어링(Harness Engineering)은 AI 에이전트 주위에 제약, 도구 연결, 검증 루프, 에러 복구 메커니즘을 설계하는 규율이다. 동일한 기반 모델이라도 주변 하네스를 어떻게 구성하느냐에 따라 코딩 벤치마크 성공률이 42%에서 78%까지 달라질 수 있다.</p><h4>실제 적용 사례</h4><p>LangChain이 자사 코딩 에이전트의 하네스를 재설계한 결과, 모델을 교체하지 않고도 Terminal Bench 2.0에서 52.8%에서 66.5%로 성능이 향상되어 순위가 Top 30에서 Top 5로 뛰어올랐다. OpenAI의 Codex 프로젝트에서는 단 세 명의 엔지니어가 약 100만 줄의 코드베이스를 관리하면서 1,500개 이상의 PR을 병합했는데, 이 또한 견고한 하네스 설계 덕분이었다. Martin Fowler는 하네스 엔지니어링을 <strong>제너레이티브 AI 시대의 핵심 소프트웨어 아키텍처 규율</strong>으로 규정했다.</p>`,
   rel:['system-prompt','mcp','tool-use','agent-framework'],
   refs:[{"title": "Harness engineering – OpenAI", "url": "https://openai.com/index/harness-engineering/", "type": "blog"}, {"title": "Harness Engineering – Martin Fowler", "url": "https://martinfowler.com/articles/exploring-gen-ai/harness-engineering.html", "type": "blog"}, {"title": "Effective harnesses for long-running agents – Anthropic", "url": "https://www.anthropic.com/engineering/effective-harnesses-for-long-running-agents", "type": "official"}],
   videos:[{"title": "How We Build Effective Agents – Barry Zhang, Anthropic", "id": "D7_ipDqhtwk", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'mcp',t:'MCP',en:'Model Context Protocol',c:'tooling',h:5,tags:['프로토콜','Anthropic','도구연결'],
   sum:'Anthropic이 2024년 11월 제안하고 전 산업 표준이 된 개방형 프로토콜로, AI 모델이 외부 도구와 데이터에 표준화된 방식으로 연결되도록 한다.',
   det:`<h4>MCP란 무엇인가</h4><p>Model Context Protocol은 AI 모델과 외부 시스템 사이의 연결을 표준화한 개방형 프로토콜이다. 핵심 비유는 <strong>AI의 USB-C</strong>. 출시 1년 만에 OpenAI, Google, Microsoft, AWS가 모두 채택했고, 2026년 4월 기준 월간 SDK 다운로드 9,700만 건, 커뮤니티 MCP 서버 5,800개 이상이다.</p><h4>실제 활용 사례</h4><p>Claude Code, Cursor, Windsurf 같은 AI 코딩 에이전트가 MCP를 통해 GitHub, 파일시스템, 데이터베이스에 실시간 접근한다. 기업에서는 Salesforce CRM, Jira, Slack에 MCP 서버를 설치하여 AI 에이전트가 조직 데이터를 직접 조회하고 작업을 수행한다. Replit, Sourcegraph, Cloudflare 등도 MCP를 채택하여 서비스를 AI 에이전트 생태계에 개방했다.</p>`,
   rel:['tool-use','harness-engineering','claude-code'],
   refs:[{"title": "Introducing the Model Context Protocol – Anthropic", "url": "https://www.anthropic.com/news/model-context-protocol", "type": "official"}, {"title": "MCP Specification", "url": "https://modelcontextprotocol.io/specification/2025-11-25", "type": "official"}, {"title": "Code execution with MCP – Anthropic Engineering", "url": "https://www.anthropic.com/engineering/code-execution-with-mcp", "type": "official"}],
   videos:[{"title": "Model Context Protocol explained – Fireship", "id": "HyzlYwjoXOQ", "lang": "en"}, {"title": "MCP Workshop – Mahesh Murag, Anthropic", "id": "kQmXtrmQ5Zg", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'claude-code',t:'Claude Code',en:'Claude Code CLI',c:'tooling',h:5,tags:['CLI','Anthropic','코딩에이전트'],
   sum:'Anthropic이 개발한 터미널 기반 AI 코딩 에이전트로, 자연어로 코드베이스를 이해하고 파일을 편집하며 Git 워크플로우 전체를 자율적으로 수행한다.',
   det:`<h4>Claude Code란 무엇인가</h4><p>Claude Code는 <strong>코드베이스 전체를 읽고, 파일을 편집하고, 셸 명령을 실행하고, 테스트를 돌리고, PR을 제출하는 전 과정을 자율적으로 수행</strong>하는 에이전트다. 멀티에이전트 오케스트레이션으로 서브에이전트가 코드베이스의 서로 다른 부분을 병렬로 처리할 수 있다.</p><h4>실제 활용 사례</h4><p>한 핀테크 플랫폼은 Claude Code를 전체 개발 사이클에 도입하여 프로젝트 일정을 몇 달에서 몇 주로 단축했다. 한 독립 개발자는 52일 만에 35만 줄의 프로덕션 코드를 혼자 작성했다. CLAUDE.md로 프로젝트 컨텍스트를 영속화하고, 훅으로 자동 포매팅과 테스트를 실행하며, 스킬로 반복 워크플로우를 명령 한 줄로 호출할 수 있다.</p>`,
   rel:['mcp','skills','hooks','claude-md'],
   refs:[{"title": "Claude Code Overview – Official Docs", "url": "https://code.claude.com/docs/en/overview", "type": "official"}, {"title": "Claude Code Best Practices", "url": "https://code.claude.com/docs/en/best-practices", "type": "official"}, {"title": "Claude Code in Action – Anthropic Courses", "url": "https://anthropic.skilljar.com/claude-code-in-action", "type": "tutorial"}],
   videos:[{"title": "Claude Code Tutorial – Peter Yang", "id": "GepHGs_CZdk", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'ai-agent',t:'AI 에이전트',en:'AI Agent',c:'agent',h:5,tags:['자율','계획','도구활용'],
   sum:'주어진 목표를 달성하기 위해 스스로 계획을 세우고, 외부 도구를 사용하며, 결과를 관찰해 다음 행동을 조정하는 자율적 AI 시스템이다.',
   det:`<h4>에이전트의 작동 원리</h4><p>핵심은 <strong>인식-추론-행동-관찰</strong>의 순환 루프다. 목표를 하위 작업으로 분해하고, 도구를 선택해 실행한 뒤, 결과를 다음 추론의 입력으로 삼는다. Gartner는 2026년 말 엔터프라이즈 앱의 40%에 AI 에이전트가 내장될 것으로 전망한다.</p><h4>실제 활용 사례</h4><p>Salesforce Agentforce는 100만 건 이상의 지원 요청을 93% 정확도로 처리했다. Microsoft Copilot은 M365 전반에서 에이전트 집합으로 진화했다. 통신사에서는 네트워크 이상 감지, 티켓 생성, 고객 통보를 사람 개입 없이 수행한다. AWS는 900개 이상의 사전 구축 에이전트 마켓플레이스를 출시했다.</p>`,
   rel:['multi-agent','agent-framework','tool-use'],
   refs:[{"title": "Building Effective Agents – Anthropic Research", "url": "https://www.anthropic.com/research/building-effective-agents", "type": "official"}, {"title": "A Practical Guide to Building Agents – OpenAI", "url": "https://cdn.openai.com/business-guides-and-resources/a-practical-guide-to-building-agents.pdf", "type": "official"}, {"title": "Introduction to AI Agents – Prompt Engineering Guide", "url": "https://www.promptingguide.ai/agents/introduction", "type": "tutorial"}],
   videos:[{"title": "How We Build Effective Agents – Barry Zhang, Anthropic", "id": "D7_ipDqhtwk", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'multi-agent',t:'멀티 에이전트',en:'Multi-Agent System',c:'agent',h:5,tags:['협업','에이전트팀','분업'],
   sum:'혼자서는 버거운 일을 여러 AI가 역할을 나눠 함께 처리하는 시스템. 회사에서 팀을 꾸리는 것처럼, AI도 팀으로 일하면 더 정확하고 빠르다.',
   det:`<h4>왜 혼자가 아니라 팀인가</h4><p>AI 에이전트 하나가 모든 일을 혼자 하면 어떻게 될까? 조사도 하고, 글도 쓰고, 검증도 하고, 번역도 해야 한다. 사람이 혼자서 기획·디자인·개발·QA를 다 하면 품질이 떨어지는 것과 같다. 멀티 에이전트는 이 문제를 "팀"으로 해결한다. 조사 전문 에이전트, 글쓰기 전문 에이전트, 검증 전문 에이전트가 각자 맡은 일을 하고 결과를 합치는 방식이다.</p>
<h4>어떤 식으로 협업하나</h4><p>가장 흔한 방식은 <strong>감독자(Supervisor) 패턴</strong>이다. 팀장 에이전트가 일감을 받으면, "이건 검색 에이전트가, 이건 분석 에이전트가" 하고 나눠준 뒤 결과를 모아서 최종 답변을 만든다. 고객 문의가 들어왔을 때 "이건 환불 담당, 이건 배송 담당"으로 라우팅하는 고객 서비스 챗봇이 대표적이다.</p><p><strong>파이프라인 패턴</strong>은 공장 조립라인 같다. A 에이전트가 문서를 요약하면 → B가 번역하고 → C가 품질을 검수하는 식으로 순서대로 넘긴다. <strong>토론 패턴</strong>은 찬성 에이전트와 반대 에이전트가 논쟁하고 심판 에이전트가 결론을 내리는 구조로, 의료 진단이나 법률 분석처럼 신중한 판단이 필요할 때 쓴다.</p>
<h4>실제로 어디에 쓰이나</h4><p>가장 많이 쓰이는 곳은 <strong>고객 서비스</strong>다. 문의가 들어오면 분류 에이전트가 유형을 파악하고, 주문 조회 에이전트가 데이터를 가져오고, 답변 에이전트가 말투에 맞게 응답을 만든다. 사람이 직접 처리하던 단순 문의의 상당 부분을 이 팀이 대신한다.</p><p><strong>소프트웨어 개발</strong>에서도 활발하다. 기획 에이전트가 요구사항을 정리하면, 코딩 에이전트가 구현하고, 테스트 에이전트가 버그를 잡고, 리뷰 에이전트가 코드 품질을 확인한다. 이 AI Wiki 사이트도 실제로 리서치·레퍼런스 수집·트렌드 분석을 세 에이전트가 병렬로 처리하는 방식으로 만들어졌다.</p><p><strong>콘텐츠 제작</strong>에서는 리서치 에이전트가 자료를 모으고, 작성 에이전트가 초안을 쓰고, 편집 에이전트가 팩트체크와 문체를 다듬는 파이프라인이 쓰인다.</p>
<h4>주의할 점</h4><p>팀이 크다고 항상 좋은 건 아니다. 에이전트가 4개를 넘어가면 서로 소통하는 비용이 실제 작업보다 커질 수 있다. 회의가 너무 많아서 일이 안 되는 회사처럼. 단순한 작업이라면 에이전트 하나로 충분하고, 정말 역할 분담이 필요한 복잡한 작업에서만 멀티 에이전트를 고려하는 게 좋다.</p>`,
   rel:['ai-agent','agent-framework','harness-engineering'],
   refs:[{"title": "Multi-Agent Workflows – LangChain Blog", "url": "https://blog.langchain.com/langgraph-multi-agent-workflows/", "type": "blog"}, {"title": "Multi-agent network – LangGraph Docs", "url": "https://langchain-ai.github.io/langgraph/tutorials/multi_agent/multi-agent-collaboration/", "type": "official"}, {"title": "Multi-Agent Systems – Hugging Face Agents Course", "url": "https://huggingface.co/learn/agents-course/en/unit2/smolagents/multi_agent_systems", "type": "tutorial"}],
   videos:[{"title": "LangGraph 멀티에이전트 – 테디노트", "id": "G8jrAA2bPnA", "lang": "ko"}, {"title": "LangGraph Multi-Agent Workflows", "id": "hvAPnpSfSGo", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'ai-coding',t:'AI 코딩 어시스턴트',en:'AI Coding Assistant',c:'application',h:5,tags:['코딩','IDE','개발도구'],
   sum:'AI로 코드 자동 완성, 리뷰, 디버깅을 실시간으로 지원하는 개발 도구로, GitHub Copilot은 2,000만 명 이상이 사용하며 Fortune 100의 90%가 도입했다.',
   det:`<h4>시장 현황</h4><p>AI 코딩 시장은 2025년 73억 7,000만 달러 규모다. Copilot이 42% 점유율, Cursor는 출시 24개월 만에 연 매출 10억 달러를 돌파했다. Copilot 사용 개발자는 작업을 55% 빠르게 완료하며, 생성한 코드가 전체 커밋의 46%를 차지한다.</p><h4>실제 활용 사례</h4><p>초기 자동 완성에서 에이전트형 코딩으로 진화하고 있다. Cursor Composer, Copilot Workspace는 자연어로 요구사항을 설명하면 여러 파일에 걸쳐 코드를 작성, 수정, 테스트한다. 전문 개발자의 51%가 AI 도구를 매일 사용하며 기본 개발 환경의 일부가 되어가고 있다.</p>`,
   rel:['claude-code','ai-agent','tool-use'],
   refs:[{"title": "Vibe Coding Explained – Google Cloud", "url": "https://cloud.google.com/discover/what-is-vibe-coding", "type": "official"}, {"title": "AI code generation: Best practices – DX", "url": "https://getdx.com/blog/ai-code-enterprise-adoption/", "type": "blog"}],
   videos:[{"title": "Claude Code Tutorial – Peter Yang", "id": "GepHGs_CZdk", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'skills',t:'스킬',en:'Skills / Slash Commands',c:'tooling',h:4,tags:['자동화','Claude Code'],
   sum:'Claude Code에서 슬래시(/)로 호출하는 재사용 가능한 자동화 워크플로우로, .claude/skills/ 디렉토리에 마크다운으로 정의하며 팀 전체가 공유할 수 있다.',
   det:`<h4>스킬이란 무엇인가</h4><p>스킬은 Claude Code의 커스텀 자동화 단위다. <strong>.claude/skills/</strong> 디렉토리에 마크다운으로 정의하며, /스킬이름으로 호출하거나 Claude가 자율적으로 로드해 실행한다.</p><h4>실제 활용 사례</h4><p><strong>/commit</strong> 스킬은 git diff를 분석하고 컨벤셔널 커밋 메시지를 자동 생성한다. <strong>/review-pr</strong> 스킬은 PR 번호를 받아 보안, 성능, 스타일 관점에서 리뷰한다. awesome-claude-code 저장소에 수백 개의 커뮤니티 스킬이 공개되어 있다. 새 팀원이 합류할 때 스킬 파일을 공유하면 Claude가 절차를 일관되게 수행한다.</p>`,
   rel:['claude-code','hooks','claude-md'],
   refs:[{"title": "Extend Claude with skills – Official Docs", "url": "https://code.claude.com/docs/en/skills", "type": "official"}, {"title": "Claude Code Customization Guide – alexop.dev", "url": "https://alexop.dev/posts/claude-code-customization-guide-claudemd-skills-subagents/", "type": "blog"}],
   videos:[{"title": "Claude Code Tutorial – Peter Yang", "id": "GepHGs_CZdk", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'hooks',t:'훅',en:'Hooks',c:'tooling',h:4,tags:['이벤트','트리거','자동화'],
   sum:'Claude Code의 특정 이벤트 전후에 자동으로 실행되는 셸 명령으로, AI의 행동을 보강하거나 제한하는 프로그래밍 방식의 가드레일이다.',
   det:`<h4>훅이란 무엇인가</h4><p>Claude Code 훅은 에이전트가 특정 행동을 수행하는 시점에 자동으로 트리거되는 셸 명령이다. <strong>LLM이 해석하는 프롬프트가 아니라 운영체제가 직접 실행하는 스크립트</strong>이므로 100% 신뢰할 수 있다. PreToolUse(도구 실행 전), PostToolUse(실행 후), Notification(상태 변화) 세 가지 이벤트에 연결된다.</p><h4>실제 활용 사례</h4><p>PostToolUse 훅으로 파일 수정 후 <code>prettier</code>를 자동 실행하면 코딩 스타일이 일관되게 유지된다. PreToolUse 훅이 <code>rm -rf</code>나 <code>DROP TABLE</code>이 포함된 명령을 자동 차단한다. GitButler는 훅을 통합하여 AI 코드 변경 전 자동 린트와 타입 체크를 실행하는 파이프라인을 구축했다.</p>`,
   rel:['claude-code','skills'],
   refs:[{"title": "Hooks reference – Claude Code Docs", "url": "https://code.claude.com/docs/en/hooks", "type": "official"}, {"title": "Claude Code Hooks: Workflow Automation – DataCamp", "url": "https://www.datacamp.com/tutorial/claude-code-hooks", "type": "tutorial"}],
   videos:[{"title": "How We Build Effective Agents – Barry Zhang, Anthropic", "id": "D7_ipDqhtwk", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'claude-md',t:'CLAUDE.md',en:'CLAUDE.md',c:'tooling',h:4,tags:['설정','프로젝트'],
   sum:'Claude Code가 세션 시작 시 자동으로 읽어 시스템 프롬프트에 포함하는 프로젝트 설정 파일로, 빌드 명령, 코딩 컨벤션, 아키텍처 규칙을 영속화한다.',
   det:`<h4>CLAUDE.md란 무엇인가</h4><p>Claude Code가 세션 시작 시 자동으로 로드하는 프로젝트 설정 파일이다. 빌드 명령, 코드 스타일, 아키텍처 안내, 테스트 지침 등 <strong>코드만으로는 알 수 없는 규칙</strong>을 담는다. 전역(~/.claude/CLAUDE.md)과 프로젝트(./CLAUDE.md) 계층으로 합산된다.</p><h4>실제 활용 사례</h4><p>신규 개발자가 합류하면 CLAUDE.md를 통해 빌드, 컨벤션, 주의사항을 즉시 파악하고 작업을 시작할 수 있다. 많이 쓰이는 패턴은 작업 중 Claude에게 규칙을 알려주면 CLAUDE.md에 추가하는 방식으로, 파일을 살아있는 문서로 점진적으로 발전시켜 나가는 것이다.</p>`,
   rel:['claude-code','skills','hooks'],
   refs:[{"title": "Memory (CLAUDE.md) – Anthropic Docs", "url": "https://docs.anthropic.com/en/docs/claude-code/memory", "type": "official"}, {"title": "How Claude remembers your project – Claude Code Docs", "url": "https://code.claude.com/docs/en/memory", "type": "official"}, {"title": "Guide to AI Agent Memory Files – Medium", "url": "https://medium.com/data-science-collective/the-complete-guide-to-ai-agent-memory-files-claude-md-agents-md-and-beyond-49ea0df5c5a9", "type": "blog"}],
   videos:[{"title": "Claude Code Tutorial – Peter Yang", "id": "GepHGs_CZdk", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'tool-use',t:'도구 사용',en:'Tool Use / Function Calling',c:'tooling',h:4,tags:['API','함수호출'],
   sum:'AI 모델이 외부 함수나 시스템을 직접 호출해 정보 검색, 코드 실행, 데이터베이스 조회 등 실제 작업을 수행할 수 있게 해주는 기능으로, 에이전트 AI의 핵심 메커니즘이다.',
   det:`<h4>도구 사용이란</h4><p>Tool Use는 LLM이 텍스트 생성에서 그치지 않고 외부 함수를 호출해 실제 작업을 수행하게 하는 메커니즘이다. 모델은 어떤 도구를 어떤 인자로 호출할지를 JSON으로 반환하고, 실제 실행은 개발자 코드가 담당한다.</p><h4>실제 활용 사례</h4><p>Salesforce는 CRM에 Tool Use를 적용해 영업 담당자가 자연어로 고객 데이터를 조회하고 계약서를 생성한다. Klarna의 AI 에이전트는 주문 조회, 환불 처리 등을 도구로 연결해 월 230만 건 대화를 처리했다. GitHub Copilot Workspace는 코드 검색, 파일 수정, 테스트 실행을 도구로 연결해 이슈 설명만으로 PR을 생성한다.</p>`,
   rel:['mcp','agent-framework','harness-engineering'],
   refs:[{"title": "Tool use with Claude – API Docs", "url": "https://platform.claude.com/docs/en/agents-and-tools/tool-use/overview", "type": "official"}, {"title": "Advanced tool use – Anthropic Engineering", "url": "https://www.anthropic.com/engineering/advanced-tool-use", "type": "official"}, {"title": "Writing effective tools for AI agents – Anthropic", "url": "https://www.anthropic.com/engineering/writing-tools-for-agents", "type": "official"}],
   videos:[{"title": "MCP Workshop – Mahesh Murag, Anthropic", "id": "kQmXtrmQ5Zg", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'rag',t:'RAG',en:'Retrieval-Augmented Generation',c:'data',h:4,tags:['검색','지식베이스','벡터DB'],
   sum:'LLM이 응답 생성 전에 외부 문서나 데이터베이스에서 관련 정보를 실시간으로 검색해 컨텍스트에 포함시킴으로써, 학습 지식 한계와 환각 문제를 동시에 해결하는 기술이다.',
   det:`<h4>RAG란 무엇인가</h4><p>RAG는 LLM이 응답 생성 시 외부 지식을 실시간 조회해 프롬프트 컨텍스트에 포함시키는 아키텍처다. 문서 수집, 청킹, 임베딩, 벡터 DB 저장, 검색, 생성의 6단계 파이프라인이다. Graph RAG, Agentic RAG, Hybrid RAG 등으로 진화 중이다.</p><h4>실제 도입 사례</h4><p>Shopify는 AI 어시스턴트 Sidekick에 RAG를 적용해 재고, 주문 내역, FAQ를 실시간 검색 후 답변한다. 한 대형 병원은 RAG 기반 임상 의사결정 시스템으로 오진율을 30% 낮추고 문헌 검토 시간을 25% 단축했다. Grab은 RAG로 정기 리포트 자동 생성과 이상 거래 분석을 처리한다.</p>`,
   rel:['embedding','vector-db','chunking'],
   refs:[{"title": "What is RAG? – Google Cloud", "url": "https://cloud.google.com/use-cases/retrieval-augmented-generation", "type": "official"}, {"title": "RAG in Azure AI Search – Microsoft", "url": "https://learn.microsoft.com/en-us/azure/search/retrieval-augmented-generation-overview", "type": "official"}, {"title": "RAG – Cohere Docs", "url": "https://docs.cohere.com/docs/retrieval-augmented-generation-rag", "type": "official"}],
   videos:[{"title": "Learn RAG From Scratch – freeCodeCamp", "id": "sVcwVQRHIc8", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'context-window',t:'컨텍스트 윈도우',en:'Context Window',c:'infra',h:4,tags:['토큰','제한'],
   sum:'LLM이 하나의 추론 과정에서 동시에 처리할 수 있는 최대 토큰 수로, 모델이 참조 가능한 기억의 상한선이다. 2026년 현재 최상위 모델들은 100만 토큰 이상을 지원한다.',
   det:`<h4>컨텍스트 윈도우란</h4><p>입출력 합산 토큰이 윈도우를 초과하면 이전 내용은 처리 대상에서 벗어난다. Claude Opus 4와 Sonnet 4는 100만, Gemini 3.1 Pro도 100만, Llama 4 Scout는 1,000만 토큰을 지원한다.</p><h4>실제 활용 사례</h4><p>100만 토큰은 소설 10권 분량이다. 법률 계약서 전체 분석, 대규모 코드베이스 리뷰, 수백 개의 고객 인터뷰 동시 분석에 활용된다. 다만 모델이 중간 부분에 덜 집중하는 <strong>Lost in the Middle</strong> 현상이 있어, 중요 정보를 앞이나 뒤에 배치하는 전략이 필요하다.</p>`,
   rel:['tokenization','llm','rag'],
   refs:[{"title": "What is a context window? – IBM", "url": "https://www.ibm.com/think/topics/context-window", "type": "blog"}, {"title": "LLM Context Windows Explained – Unstructured", "url": "https://unstructured.io/insights/llm-context-windows-explained-a-developer-s-guide", "type": "tutorial"}],
   videos:[{"title": "Intro to Large Language Models – Andrej Karpathy", "id": "zjkBMFhNj_g", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'agent-framework',t:'에이전트 프레임워크',en:'Agent Framework',c:'agent',h:4,tags:['SDK','프레임워크'],
   sum:'AI 에이전트의 구축, 오케스트레이션, 배포를 위한 표준화된 추상화 계층으로, 메모리 관리, 도구 연동, 다중 에이전트 협업의 복잡한 로직을 직접 구현하지 않아도 된다.',
   det:`<h4>프레임워크가 해결하는 문제</h4><p>에이전트를 직접 구현하면 상태 관리, 오류 처리, 메시지 라우팅 등 인프라 코드가 대부분이다. <strong>LangGraph</strong>는 그래프 기반 복잡한 워크플로에 강하고, <strong>CrewAI</strong>는 역할 기반 팀 협업으로 빠른 MVP에 유리하며, <strong>Claude Agent SDK</strong>는 Claude 중심의 도구 사용과 다중 에이전트를 통합 지원한다.</p><h4>실제 활용 사례</h4><p>IBM 분석에 따르면 역할 기반 분업에는 CrewAI, 유연한 상태 제어에는 LangGraph가 적합하다. 많은 팀이 CrewAI로 프로토타입을 만든 뒤 LangGraph로 프로덕션에 이관한다.</p>`,
   rel:['ai-agent','mcp','multi-agent'],
   refs:[{"title": "LangGraph – LangChain", "url": "https://www.langchain.com/langgraph", "type": "official"}, {"title": "AutoGen – Microsoft", "url": "https://microsoft.github.io/autogen/stable//index.html", "type": "official"}, {"title": "LangChain & LangGraph 1.0 – Blog", "url": "https://blog.langchain.com/langchain-langgraph-1dot0/", "type": "blog"}],
   videos:[{"title": "LangGraph 멀티에이전트 – 테디노트", "id": "G8jrAA2bPnA", "lang": "ko"}],
   updated:'2026-04-01'},

  {id:'ai-workflow',t:'AI 워크플로우',en:'AI Workflow Automation',c:'application',h:4,tags:['자동화','파이프라인'],
   sum:'LLM과 외부 서비스를 연결해 이메일 분류, 데이터 추출, 리포트 생성 같은 반복 업무를 자율적으로 처리하는 시스템으로, n8n, Zapier, Make 등이 코드 없이 AI 파이프라인을 구축하게 해 준다.',
   det:`<h4>AI 워크플로우의 개념</h4><p>LLM을 의사결정 주체로 파이프라인에 통합한다. 이전의 자동화가 규칙 기반이었다면, AI 워크플로우는 모델이 비정형 입력을 이해하고 상황에 맞게 분기하거나 도구를 호출한다.</p><h4>실제 활용 사례</h4><p>n8n은 AI 전용 노드를 70개 가까이 탑재하고 LangChain 통합으로 RAG와 멀티에이전트를 지원한다. Zapier는 8,000개 이상의 앱과 400개 AI 도구를 연결해 하루 80만 건 자동화를 처리한다. Remote는 IT 팀원 3명이 직원 1,700명을 지원하는 구조를 Zapier 기반 AI 자동화로 실현했다.</p>`,
   rel:['ai-agent','mcp','tool-use'],
   refs:[{"title": "Build an AI Workflow in n8n – Official Docs", "url": "https://docs.n8n.io/advanced-ai/intro-tutorial/", "type": "official"}, {"title": "AI Workflow Automation 2025 – orq.ai", "url": "https://orq.ai/blog/ai-workflow-automation", "type": "blog"}, {"title": "Agent Workflows – LlamaIndex", "url": "https://www.llamaindex.ai/workflows", "type": "official"}],
   videos:[{"title": "n8n & AI Integration – freeCodeCamp", "id": "1MwSoB0gnM4", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'prompt-engineering',t:'프롬프트 엔지니어링',en:'Prompt Engineering',c:'prompting',h:3,tags:['프롬프트','입력설계'],
   sum:'AI 모델에서 원하는 결과를 안정적으로 얻기 위해 입력 텍스트를 설계하고 최적화하는 기술로, 2026년에는 조직 표준으로 내재화되고 있다.',
   det:`<h4>프롬프트 엔지니어링의 진화</h4><p>프롬프트 엔지니어링은 LLM이 원하는 출력을 생성하도록 입력을 체계적으로 구성하는 기술이다. 핵심 기법으로는 역할 부여, 퓨샷 프롬프팅, 사고의 사슬(CoT), 프롬프트 스캐폴딩이 있다.</p><h4>실제 활용 사례</h4><p>Palantir는 AIP 내부 지침에서 역할 기반 시스템 프롬프트와 퓨샷 예시 조합을 표준화하여 다양한 고객사에 걸쳐 일관된 AI 응답 품질을 유지한다. Dropbox는 Lakera Guard와 함께 방어적 프롬프트 설계를 도입하여 프롬프트 인젝션 공격을 차단하고 있다. Fast Company의 2025년 보고에 따르면 68%의 기업이 전 직원 대상 표준 교육으로 내재화했다.</p>`,
   rel:['few-shot','chain-of-thought','system-prompt'],
   refs:[{"title": "Prompt Engineering Guide – OpenAI", "url": "https://platform.openai.com/docs/guides/prompt-engineering", "type": "official"}, {"title": "Prompt Engineering – Anthropic", "url": "https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/overview", "type": "official"}, {"title": "Interactive Prompt Engineering Tutorial – Anthropic GitHub", "url": "https://github.com/anthropics/prompt-eng-interactive-tutorial", "type": "tutorial"}],
   videos:[{"title": "Deep Dive into LLMs – Andrej Karpathy", "id": "7xTGNNLPyMI", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'system-prompt',t:'시스템 프롬프트',en:'System Prompt',c:'prompting',h:3,tags:['설정','역할부여'],
   sum:'대화가 시작되기 전 AI의 역할, 성격, 행동 규칙을 사전에 정의하는 특수 지시문으로, 모든 사용자 메시지에 일관되게 적용되는 보이지 않는 헌법이다.',
   det:`<h4>시스템 프롬프트란 무엇인가</h4><p>시스템 프롬프트는 개발자가 모델에게 전달하는 사전 지시문으로, <strong>페르소나, 응답 범위, 출력 형식, 금지 행동</strong>을 규정하며 모든 후속 대화에 지속적으로 영향을 미친다.</p><h4>실제 활용 사례</h4><p>GitHub Copilot은 코드 편집기에서 컨텍스트를 실시간으로 수집한 뒤 시스템 프롬프트로 구성하여 프로젝트 스타일에 맞는 자동완성을 제공한다. Anthropic의 Claude는 헌법적 AI로 훈련되었지만, 배포 시에는 시스템 프롬프트를 통해 특정 사용 사례에 맞게 행동을 조정한다. 시스템 프롬프트는 하네스 엔지니어링의 첫 번째 레이어로, 도구 검증과 피드백 루프와 결합될 때 진정한 가치를 발휘한다.</p>`,
   rel:['prompt-engineering','harness-engineering'],
   refs:[{"title": "시스템 프롬프트 – Anthropic 한국어 문서", "url": "https://docs.anthropic.com/ko/docs/build-with-claude/prompt-engineering/system-prompts", "type": "official"}, {"title": "Prompt Engineering – OpenAI", "url": "https://platform.openai.com/docs/guides/prompt-engineering", "type": "official"}],
   videos:[{"title": "Intro to Large Language Models – Andrej Karpathy", "id": "zjkBMFhNj_g", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'chain-of-thought',t:'사고의 사슬',en:'Chain-of-Thought',c:'prompting',h:3,tags:['추론','단계적사고'],
   sum:'모델이 최종 답변 전에 중간 추론 과정을 단계적으로 생성하도록 유도하는 프롬프팅 기법으로, 복잡한 수학과 논리 문제에서 정확도를 크게 높인다.',
   det:`<h4>사고의 사슬이란</h4><p>2022년 Google Research가 체계화한 기법으로, PaLM에서 적용한 결과 수학 벤치마크 GSM8K에서 파인튜닝된 GPT-3를 능가했다. 다만 <strong>약 100B 파라미터 이상의 모델에서만 유의미한 효과</strong>를 보인다.</p><h4>실제 활용 사례</h4><p>금융 분야에서는 시장 데이터 분석 시스템에 CoT를 도입하여 예측 근거의 투명성을 높였다. 법률 테크 스타트업들은 AI가 각 법적 근거를 단계별로 전개하도록 설계하고 있다. 고객 서비스에서도 복잡한 환불 정책이나 보험 약관 해석 같은 다단계 판단에 CoT가 적용되어 응답 정확성과 사용자 신뢰도를 동시에 높이고 있다.</p>`,
   rel:['prompt-engineering','few-shot'],
   refs:[{"title": "Chain-of-Thought Prompting (원 논문) – arXiv", "url": "https://arxiv.org/abs/2201.11903", "type": "paper"}, {"title": "What is Chain of Thought? – IBM", "url": "https://www.ibm.com/think/topics/chain-of-thoughts", "type": "blog"}, {"title": "Chain-of-Thought Prompting – Learn Prompting", "url": "https://learnprompting.org/docs/intermediate/chain_of_thought", "type": "tutorial"}],
   videos:[{"title": "Deep Dive into LLMs – Andrej Karpathy", "id": "7xTGNNLPyMI", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'llm',t:'대규모 언어 모델',en:'Large Language Model',c:'model',h:3,tags:['GPT','Claude','Transformer'],
   sum:'수백억 개의 파라미터를 갖춘 딥러닝 모델로, 방대한 텍스트 데이터를 학습해 언어 이해, 생성, 추론, 코드 작성 등 광범위한 작업을 수행하는 2020년대 AI 혁명의 핵심 기술이다.',
   det:`<h4>대규모 언어 모델의 정의</h4><p>대규모 언어 모델(LLM)은 수조 개의 토큰으로 학습한 트랜스포머 기반 신경망이다. GPT(OpenAI), Claude(Anthropic), Gemini(Google), Llama(Meta) 등이 대표적이다.</p><h4>실제 활용 사례</h4><p>GitHub Copilot은 월간 활성 사용자 180만 명을 돌파하며 개발자 생산성을 평균 55% 높인다. Harvey AI는 Allen and Overy 등 대형 로펌과 협력해 계약서 검토와 판례 분석을 자동화한다. Google의 MedPaLM 2는 미국 의사 면허 시험(USMLE)에서 86.5% 정답률을 기록했다.</p>`,
   rel:['transformer','fine-tuning','tokenization'],
   refs:[{"title": "Large Language Models: A Survey – arXiv", "url": "https://arxiv.org/abs/2402.06196", "type": "paper"}, {"title": "LLM – Google ML Crash Course", "url": "https://developers.google.com/machine-learning/crash-course/llm", "type": "official"}],
   videos:[{"title": "Intro to Large Language Models – Andrej Karpathy", "id": "zjkBMFhNj_g", "lang": "en"}, {"title": "Deep Dive into LLMs – Andrej Karpathy", "id": "7xTGNNLPyMI", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'fine-tuning',t:'파인튜닝',en:'Fine-Tuning',c:'model',h:3,tags:['학습','LoRA','맞춤화'],
   sum:'사전 학습된 모델을 특정 도메인에 맞는 소규모 데이터로 추가 학습시키는 기법으로, LoRA 같은 파라미터 효율적 방법 덕분에 일반 기업도 접근 가능해졌다.',
   det:`<h4>파인튜닝이란</h4><p>기반 모델의 가중치를 특정 목적의 소규모 데이터셋으로 추가 조정하는 과정이다. LoRA는 전체 파라미터의 0.1~1%만 학습하면서 풀 파인튜닝에 근접한 성능을 낸다. QLoRA는 4비트 양자화를 추가해 소비자용 GPU 한 장으로도 파인튜닝할 수 있게 했다.</p><h4>실제 활용 사례</h4><p>한 대형 병원 그룹은 수만 건의 임상 기록으로 파인튜닝해 의학 용어 인식 정확도를 40% 이상 높였다. 블룸버그는 Bloomberg GPT로 금융 NLP에서 범용 모델을 일관되게 앞섰다. OpenAI, AWS Bedrock, Google Vertex AI가 관리형 파인튜닝 서비스를 제공한다.</p>`,
   rel:['llm','rlhf'],
   refs:[{"title": "Ultimate Guide to Fine-Tuning LLMs – arXiv", "url": "https://arxiv.org/html/2408.13296v1", "type": "paper"}, {"title": "Fine-Tune Open LLMs in 2025 – philschmid.de", "url": "https://www.philschmid.de/fine-tune-llms-in-2025", "type": "tutorial"}, {"title": "Fine-Tuning an LLM – Google ML Crash Course", "url": "https://developers.google.com/machine-learning/crash-course/llm/tuning", "type": "official"}],
   videos:[{"title": "Deep Dive into LLMs – Andrej Karpathy", "id": "7xTGNNLPyMI", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'multimodal',t:'멀티모달',en:'Multimodal AI',c:'model',h:3,tags:['비전','음성','영상'],
   sum:'텍스트뿐 아니라 이미지, 음성, 영상 등 여러 형태의 데이터를 하나의 모델이 통합 처리하는 AI로, GPT-4o와 Gemini가 선도하고 있다.',
   det:`<h4>멀티모달 AI란</h4><p>서로 다른 형태의 데이터를 동시에 처리하는 시스템이다. GPT-4o는 텍스트, 이미지, 음성을 하나의 모델에서 처리하며 응답 지연 평균 320밀리초. Gemini 2.5 Pro는 200만 토큰 컨텍스트에서 텍스트, 이미지, 오디오, 비디오를 함께 처리한다.</p><h4>실제 활용 사례</h4><p>법률 분야에서 대형 로펌들이 수천 페이지의 소송 자료와 이미지를 함께 분석한다. Google Med-Gemini는 X선, CT, 병리 슬라이드와 환자 기록을 통합 분석해 진단 보조에 사용된다. Khan Academy에서는 학생이 수학 풀이를 사진으로 찍으면 오류 단계를 정확히 짚어준다. Adobe Firefly는 텍스트와 참조 이미지로 브랜드 가이드라인에 맞는 콘텐츠를 생성한다.</p>`,
   rel:['llm','embedding'],
   refs:[{"title": "Multimodal AI: Complete Guide 2025 – Shaip", "url": "https://www.shaip.com/blog/multimodal-ai-the-complete-guide-to-training-data/", "type": "blog"}, {"title": "Building Multimodal Search and RAG – DeepLearning.AI", "url": "https://www.deeplearning.ai/short-courses/building-multimodal-search-and-rag/", "type": "tutorial"}],
   videos:[{"title": "Deep Dive into LLMs – Andrej Karpathy", "id": "7xTGNNLPyMI", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'embedding',t:'임베딩',en:'Embedding',c:'data',h:3,tags:['벡터','유사도'],
   sum:'텍스트, 이미지, 코드 등 비정형 데이터를 의미를 보존하는 고차원 벡터로 변환하는 기술로, 의미적으로 유사한 개념이 벡터 공간에서 가깝게 위치하도록 만든다.',
   det:`<h4>임베딩의 원리</h4><p>입력 데이터를 수백~수천 차원의 벡터로 압축한다. <strong>자동차</strong>와 <strong>automobile</strong>은 철자가 다르지만 임베딩 벡터는 가까운 위치에 놓인다. 코사인 유사도로 의미적 유사성을 수치로 측정할 수 있다.</p><h4>실제 도입 사례</h4><p>Dropbox는 임베딩 기반 시맨틱 검색으로 검색 결과 없음 비율을 17% 줄였다. Zendesk는 고객 지원 검색 품질 향상으로 MRR이 7% 개선됐다. Spotify는 임베딩 기반 추천 시스템으로 세션 및 트랙 추천 지표에서 10% 이상 향상을 이끌어냈다.</p>`,
   rel:['rag','vector-db'],
   refs:[{"title": "OpenAI Embeddings Guide", "url": "https://platform.openai.com/docs/guides/embeddings", "type": "official"}, {"title": "Google Gemini API – Embeddings", "url": "https://ai.google.dev/gemini-api/docs/embeddings", "type": "official"}, {"title": "What are embeddings? – Cloudflare", "url": "https://www.cloudflare.com/learning/ai/what-are-embeddings/", "type": "tutorial"}],
   videos:[{"title": "Attention in Transformers – 3Blue1Brown", "id": "eMlx5fFNoYc", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'vector-db',t:'벡터 DB',en:'Vector Database',c:'data',h:3,tags:['벡터검색','저장소'],
   sum:'임베딩 벡터를 저장하고 ANN 알고리즘으로 수백만~수십억 개의 벡터 중에서 가장 유사한 항목을 밀리초 단위로 찾아주는 전문 데이터베이스다.',
   det:`<h4>벡터 DB가 필요한 이유</h4><p>관계형 DB는 벡터 간 코사인 유사도 비교에 적합하지 않다. 벡터 DB는 HNSW나 IVF로 수십억 벡터에서 수십 밀리초 안에 결과를 반환한다. <strong>Pinecone</strong>은 10억 벡터 기준 p99 응답 47ms, <strong>Weaviate</strong>는 하이브리드 검색이 강점, <strong>Chroma</strong>는 Rust 재작성으로 성능 4배 향상됐다.</p><h4>실제 활용 사례</h4><p>Netflix와 Spotify는 사용자 행동과 콘텐츠 임베딩을 실시간 비교해 추천한다. 이커머스에서는 상품 이미지를 임베딩으로 변환해 이미지 검색에 활용한다. 기업 내부에서는 Slack, 사내 문서, 회의록을 색인해 자연어로 지식을 검색하는 엔터프라이즈 검색 시스템을 구축한다.</p>`,
   rel:['embedding','rag','chunking'],
   refs:[{"title": "Milvus – High-Performance Vector Database", "url": "https://milvus.io/", "type": "official"}, {"title": "Qdrant Vector Database", "url": "https://qdrant.tech/qdrant-vector-database/", "type": "official"}, {"title": "Vector Databases Guide: RAG 2025 – DEV", "url": "https://dev.to/klement_gunndu_e16216829c/vector-databases-guide-rag-applications-2025-55oj", "type": "tutorial"}],
   videos:[{"title": "RAG Fundamentals – freeCodeCamp", "id": "ea2W8IogX80", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'chunking',t:'청킹',en:'Chunking',c:'data',h:3,tags:['전처리','문서분할'],
   sum:'대용량 문서를 LLM이 효율적으로 처리하고 벡터 DB에 정밀하게 색인할 수 있도록 의미 있는 작은 단위로 분할하는 전처리 과정으로, RAG 검색 정확도에 직결된다.',
   det:`<h4>청킹이 중요한 이유</h4><p>청크가 너무 크면 노이즈가 증가하고, 너무 작으면 문맥이 단절된다. <strong>재귀적 문자 청킹</strong>은 자연스러운 경계를 찾아 분할하며 400~512 토큰, 10~20% 오버랩이 권장된다. <strong>시맨틱 청킹</strong>은 임베딩 유사도 급변 지점을 경계로 91~92% 리콜을 달성한다.</p><h4>실험 결과</h4><p>Chroma 연구에서 재귀적 청킹은 85~90% 리콜, 시맨틱 청킹은 91~92%를 달성했다. NVIDIA는 도메인별로 전략을 달리하되 단순한 방법으로 베이스라인을 먼저 측정할 것을 권장한다.</p>`,
   rel:['rag','embedding'],
   refs:[{"title": "Best Chunking Strategies for RAG 2025 – Firecrawl", "url": "https://www.firecrawl.dev/blog/best-chunking-strategies-rag", "type": "blog"}, {"title": "Chunking Strategies for RAG – Weaviate", "url": "https://weaviate.io/blog/chunking-strategies-for-rag", "type": "blog"}, {"title": "Chunking in RAG – Stack Overflow Blog", "url": "https://stackoverflow.blog/2024/12/27/breaking-up-is-hard-to-do-chunking-in-rag-applications/", "type": "blog"}],
   videos:[{"title": "Learn RAG From Scratch – freeCodeCamp", "id": "sVcwVQRHIc8", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'langchain',t:'랭체인',en:'LangChain',c:'tooling',h:3,tags:['프레임워크','Python'],
   sum:'LLM 기반 앱과 에이전트를 구축하기 위한 오픈소스 프레임워크로, 11만 개 이상의 GitHub 스타를 기록하며 프로덕션 AI 에이전트 개발의 사실상 표준이 됐다.',
   det:`<h4>LangChain이란</h4><p>2022년 Harrison Chase가 공개한 프레임워크로, LLM 호출, 메모리 관리, 도구 연결, 에이전트 오케스트레이션을 하나의 인터페이스로 묶어준다. LangGraph는 그래프 기반 복잡한 멀티 에이전트 시스템 구현에 사용된다.</p><h4>실제 활용 사례</h4><p>2026년 기준 1,300개 이상의 기업이 사용하며 57%가 에이전트를 프로덕션에 배포했다. 한 글로벌 금융 서비스 기업은 LangGraph로 규정 준수 문서 검토 에이전트를 구축해 처리 시간을 70% 단축했다.</p>`,
   rel:['agent-framework','rag'],
   refs:[{"title": "LangChain Documentation", "url": "https://docs.langchain.com/", "type": "official"}, {"title": "LangChain & LangGraph 1.0 – Blog", "url": "https://blog.langchain.com/langchain-langgraph-1dot0/", "type": "blog"}],
   videos:[{"title": "테디노트 LangChain 한국어 튜토리얼", "id": "MM9x42gTBag", "lang": "ko"}, {"title": "Learn RAG From Scratch – freeCodeCamp", "id": "sVcwVQRHIc8", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'eval',t:'AI 평가',en:'Evaluation',c:'infra',h:3,tags:['벤치마크','품질측정'],
   sum:'AI 모델이나 시스템의 성능, 정확도, 안전성을 체계적으로 측정하는 프로세스로, 벤치마크 점수부터 LLM-as-a-judge까지 다양한 평가 방식이 공존한다.',
   det:`<h4>평가가 중요한 이유</h4><p>LLM은 같은 입력에도 다른 출력을 낼 수 있고 환각도 생성한다. 코딩은 <strong>SWE-Bench Verified</strong>, 추론은 MMLU, 에이전트는 WebArena로 측정한다.</p><h4>프로덕션 평가 방식</h4><p><strong>결정론적 평가</strong>는 정답이 명확한 경우, <strong>LLM-as-a-Judge</strong>는 응답 적절성, <strong>Human-in-the-Loop</strong>는 의료 및 법률에서 필수적이다. Maxim AI, Langfuse 등이 평가를 통합 지원하며 CI/CD 통합 평가가 모범 사례로 자리잡고 있다.</p>`,
   rel:['llm','guardrail'],
   refs:[{"title": "DeepEval – LLM Evaluation Framework", "url": "https://deepeval.com/docs/getting-started", "type": "official"}, {"title": "OpenAI Evals API", "url": "https://developers.openai.com/api/docs/guides/evals", "type": "official"}, {"title": "LangSmith Evaluation", "url": "https://www.langchain.com/langsmith/evaluation", "type": "official"}],
   videos:[{"title": "Deep Dive into LLMs – Andrej Karpathy", "id": "7xTGNNLPyMI", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'hallucination',t:'환각',en:'Hallucination',c:'safety',h:3,tags:['신뢰성','오류'],
   sum:'AI가 사실이 아닌 정보를 마치 진실인 것처럼 확신 있게 생성하는 현상으로, 법률, 의료, 금융 등 고위험 분야에서 심각한 피해를 유발한다.',
   det:`<h4>환각이란 무엇인가</h4><p>모델이 다음 토큰을 예측하는 방식으로 텍스트를 생성하므로 사실 여부를 실시간으로 검증하지 못하는 구조적 한계에서 비롯된다.</p><h4>실제 피해 사례</h4><p>에어 캐나다는 챗봇이 존재하지 않는 유가족 할인을 안내해 배상 판결을 받았다. 딜로이트가 호주 정부에 제출한 44만 달러 보고서에서 가짜 학술 출처가 발견됐다. 스탠퍼드 연구에 따르면 법률 질문 환각률이 75~88%에 달한다. 2024년 한 해 전 세계 AI 환각 관련 피해는 약 674억 달러로 추산된다. MIT 연구는 모델이 환각을 일으킬 때 오히려 더 자신 있는 어조를 사용한다는 점도 밝혔다.</p>`,
   rel:['rag','guardrail'],
   refs:[{"title": "What Are AI Hallucinations? – IBM", "url": "https://www.ibm.com/think/topics/ai-hallucinations", "type": "official"}, {"title": "Hallucination Detection in LLMs – arXiv", "url": "https://arxiv.org/html/2601.09929v1", "type": "paper"}],
   videos:[{"title": "Deep Dive into LLMs – Andrej Karpathy", "id": "7xTGNNLPyMI", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'guardrail',t:'가드레일',en:'Guardrail',c:'safety',h:3,tags:['안전장치','필터링'],
   sum:'AI 모델의 입력과 출력을 실시간으로 검사해 유해 콘텐츠, 개인정보 유출, 주제 이탈 등을 차단하는 다층 안전 장치다.',
   det:`<h4>가드레일의 구조</h4><p>입력 단계에서 프롬프트를 검사하고, 출력 단계에서 혐오 표현, PII, 저작권 콘텐츠를 필터링한다. 모델 자체의 안전성에 의존하지 않고 외부에서 독립적으로 정책을 집행하는 레이어다.</p><h4>실제 활용 사례</h4><p>Amazon Bedrock Guardrails는 콘텐츠 필터링, 금지 주제, 민감 정보 감지를 제공하며 서드파티 LLM에도 적용 가능하다. Guardrails AI 프레임워크는 50개 이상의 검증기를 허브로 제공한다. Forrester는 2025년 말 <strong>에이전트 제어 플레인</strong>을 독립 시장 범주로 정의했으며, 금융과 의료에서 가드레일이 컴플라이언스 요건으로 명문화되는 추세다.</p>`,
   rel:['hallucination','prompt-injection'],
   refs:[{"title": "NVIDIA NeMo Guardrails", "url": "https://developer.nvidia.com/nemo-guardrails", "type": "official"}, {"title": "Guardrails AI", "url": "https://guardrailsai.com/", "type": "official"}, {"title": "LLM Guardrails Best Practices 2025 – Leanware", "url": "https://www.leanware.co/insights/llm-guardrails", "type": "blog"}],
   videos:[{"title": "Deep Dive into LLMs – Andrej Karpathy", "id": "7xTGNNLPyMI", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'prompt-injection',t:'프롬프트 인젝션',en:'Prompt Injection',c:'safety',h:3,tags:['보안','공격'],
   sum:'악의적인 텍스트를 모델 입력에 삽입해 시스템 지시를 무력화하거나 원치 않는 동작을 유발하는 공격 기법으로, OWASP LLM Top 10의 1위 취약점이다.',
   det:`<h4>공격 원리</h4><p>LLM이 시스템 프롬프트와 사용자 입력을 동일한 텍스트 스트림으로 처리한다는 구조적 특성을 악용한다. 프로덕션 AI의 73% 이상에서 발견된다.</p><h4>실제 침해 사례</h4><p>GitHub Copilot에서 코드 주석에 삽입된 프롬프트가 설정 파일을 조작하고 임의 코드를 실행하는 공격이 발견됐다. Microsoft 365 Copilot의 EchoLeak은 이메일 한 통으로 내부 데이터를 유출했다. 36개 LLM 통합 앱 중 31개가 인젝션에 취약한 것으로 확인됐다. 완전한 방어법은 아직 없으며, 입력 정제, 컨텍스트 분리, 출력 검증, 최소 권한 원칙을 조합해 공격 표면을 줄인다.</p>`,
   rel:['guardrail','system-prompt'],
   refs:[{"title": "OWASP LLM01:2025 Prompt Injection", "url": "https://genai.owasp.org/llmrisk/llm01-prompt-injection/", "type": "official"}, {"title": "Guide to Prompt Injection – Lakera", "url": "https://www.lakera.ai/blog/guide-to-prompt-injection", "type": "blog"}],
   videos:[{"title": "Prompt Injection Explained – Simon Willison", "id": "FgxwCaL6UTA", "lang": "en"}, {"title": "Deep Dive into LLMs – Andrej Karpathy", "id": "7xTGNNLPyMI", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'chatbot',t:'챗봇',en:'Conversational AI',c:'application',h:3,tags:['대화','고객응대'],
   sum:'자연어로 사용자 질문에 응답하고 업무를 처리하는 대화형 AI 인터페이스로, 2025년에는 80% 이상의 고객 서비스 팀이 AI 챗봇을 도입했다.',
   det:`<h4>대화형 AI의 발전</h4><p>규칙 기반 스크립트에서 LLM 기반 문맥 이해 AI로 진화했다. 2020년 5%에서 2025년 80%로 16배 성장. 통신업계 95%, 금융 92% 도입률이다.</p><h4>실제 활용 사례</h4><p>리프트(Lyft)는 문제 해결 속도가 87% 빨라졌다. 뱅크 오브 아메리카의 에리카(Erica)는 상담 98%를 1분 이내 처리한다. AI 고객 서비스에 투자한 1달러당 평균 3.5달러 수익이 발생한다. 다만 복잡하거나 감정적인 문제에서는 75%의 고객이 사람을 원하므로, AI가 빠른 처리를 담당하고 필요 시 인간에게 넘기는 <strong>휴먼 핸드오프</strong> 구조가 가장 효과적이다.</p>`,
   rel:['rag','system-prompt'],
   refs:[{"title": "Build an LLM RAG Chatbot – Real Python", "url": "https://realpython.com/build-llm-rag-chatbot-with-langchain/", "type": "tutorial"}, {"title": "Build a RAG Agent – LangChain Docs", "url": "https://docs.langchain.com/oss/python/langchain/rag", "type": "official"}],
   videos:[{"title": "테디노트 LangChain RAG 챗봇 한국어", "id": "MM9x42gTBag", "lang": "ko"}, {"title": "RAG Fundamentals – freeCodeCamp", "id": "ea2W8IogX80", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'ai-search',t:'AI 검색',en:'AI-Powered Search',c:'application',h:3,tags:['의미검색'],
   sum:'키워드 매칭 대신 의미 이해를 기반으로 정보를 검색하고 직접 답변을 생성하는 기술로, Perplexity AI는 월 4,500만 명이 사용하며 검색 패러다임 전환을 이끌고 있다.',
   det:`<h4>AI 검색의 원리</h4><p>벡터 임베딩으로 의미상 유사한 문서를 찾고, LLM이 종합해 답변을 생성한다. 사용자는 링크 목록 대신 출처가 인용된 요약 답변을 받는다. Perplexity AI는 2026년 초 4,500만 활성 사용자, 기업 가치 약 200억 달러를 달성했다.</p><h4>실제 활용 사례</h4><p>AI 검색 트래픽의 전환율(14.2%)은 Google 검색(2.8%)보다 5배 높다. 기업들은 기존 SEO를 넘어 AI 모델이 출처로 인용하기 좋은 구조화된 콘텐츠를 만드는 GEO(Generative Engine Optimization) 전략으로 전환하고 있다.</p>`,
   rel:['rag','embedding'],
   refs:[{"title": "RAG in Azure AI Search – Microsoft", "url": "https://learn.microsoft.com/en-us/azure/search/retrieval-augmented-generation-overview", "type": "official"}, {"title": "What is RAG? – AWS", "url": "https://aws.amazon.com/what-is/retrieval-augmented-generation/", "type": "official"}],
   videos:[{"title": "Learn RAG From Scratch – freeCodeCamp", "id": "sVcwVQRHIc8", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'structured-output',t:'구조화된 출력',en:'Structured Output',c:'application',h:3,tags:['JSON','스키마'],
   sum:'AI 모델이 JSON 스키마 같은 미리 정의된 형식을 100% 준수해 응답하도록 강제하는 기술로, AI를 기존 소프트웨어 파이프라인에 신뢰성 있게 통합하기 위한 핵심 요소다.',
   det:`<h4>구조화된 출력이란</h4><p>LLM은 자유 텍스트를 생성하도록 설계되어, 제약 없이는 JSON 형식이 깨지거나 필드가 누락된다. 구조화된 출력은 제약 디코딩으로 생성 토큰을 스키마에 맞게 제한해 형식을 보장한다.</p><h4>실제 활용 사례</h4><p>계약서에서 당사자, 날짜, 금액을 자동 추출하는 법무 자동화, 의료 기록의 정형 데이터 변환, 멀티에이전트 간 데이터 교환에 필수적이다. 2025~2026년 업계 표준은 <strong>스키마 우선 개발</strong>로, Zod나 Pydantic으로 구조를 먼저 정의한 뒤 모델에 전달한다. 이 접근법은 LLM을 타입 안전한 함수처럼 다루게 해 AI를 기존 코드베이스에 안정적으로 통합하게 한다.</p>`,
   rel:['tool-use','prompt-engineering'],
   refs:[{"title": "Structured Outputs – OpenAI Docs", "url": "https://platform.openai.com/docs/guides/structured-outputs", "type": "official"}, {"title": "Introducing Structured Outputs – OpenAI Blog", "url": "https://openai.com/index/introducing-structured-outputs-in-the-api/", "type": "official"}, {"title": "Structured Outputs Intro – OpenAI Cookbook", "url": "https://developers.openai.com/cookbook/examples/structured_outputs_intro", "type": "tutorial"}],
   videos:[{"title": "Deep Dive into LLMs – Andrej Karpathy", "id": "7xTGNNLPyMI", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'react-pattern',t:'ReAct 패턴',en:'ReAct',c:'agent',h:3,tags:['추론','행동루프'],
   sum:'LLM이 생각(Thought), 행동(Action), 관찰(Observation)을 교차 반복하면서 외부 도구와 상호작용해 복잡한 문제를 단계별로 해결하는 에이전트 설계 패턴이다.',
   det:`<h4>ReAct 패턴의 구조</h4><p>2022년 Google Research와 Princeton이 발표한 프레임워크로, Thought → Action → Observation을 반복한다. 추론 흔적이 기록되어 사람이 추적하고 검증할 수 있다.</p><h4>실제 활용 사례</h4><p>원 논문에서 ALFWorld 벤치마크 성공률을 34% 높였다. LangChain의 AgentExecutor는 ReAct를 기본으로 채택하고, Claude는 도구 사용으로 ReAct를 네이티브 지원한다. 웹 검색 리서치, 코드 실행 데이터 분석, 멀티스텝 고객 지원에서 사실상의 기본 패턴이 됐다.</p>`,
   rel:['ai-agent','chain-of-thought'],
   refs:[{"title": "ReAct: Synergizing Reasoning and Acting (원 논문) – arXiv", "url": "https://arxiv.org/abs/2210.03629", "type": "paper"}, {"title": "ReAct Prompting – Prompt Engineering Guide", "url": "https://www.promptingguide.ai/techniques/react", "type": "tutorial"}, {"title": "What is a ReAct Agent? – IBM", "url": "https://www.ibm.com/think/topics/react-agent", "type": "blog"}],
   videos:[{"title": "Deep Dive into LLMs – Andrej Karpathy", "id": "7xTGNNLPyMI", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'few-shot',t:'퓨샷',en:'Few-Shot Prompting',c:'prompting',h:2,tags:['예시학습'],
   sum:'프롬프트 안에 입출력 예시를 몇 개 포함시켜 모델이 원하는 형식과 패턴을 학습하도록 유도하는 기법으로, 파인튜닝 없이 빠르게 모델 행동을 조정할 수 있다.',
   det:`<h4>퓨샷 프롬프팅의 원리</h4><p>목표 작업의 입력-출력 예시를 2~8개 포함하여 모델이 패턴을 파악하도록 유도한다. 의료 연구에서 GPT-4o에 퓨샷을 적용한 결과 임상 진단 정확도가 82.4%에서 85.9%로 향상되었다.</p><h4>실제 활용 사례</h4><p>고객 지원 분류 시스템에서 퓨샷 예시를 추가하면 카테고리 오분류율이 크게 줄어든다. 이커머스 플랫폼에서는 카테고리별 2~3개의 골든 샘플로 수백 개의 상품 설명을 일관된 스타일로 생성한다. RAG와 결합하여 벡터 DB에서 관련성 높은 예시를 동적으로 검색해 프롬프트에 주입하는 방식이 표준 패턴으로 자리잡고 있다.</p>`,
   rel:['prompt-engineering','chain-of-thought'],
   refs:[{"title": "Few-Shot Prompting – Prompt Engineering Guide", "url": "https://www.promptingguide.ai/techniques/fewshot", "type": "tutorial"}, {"title": "퓨샷 프롬프팅 – Learn Prompting (한국어)", "url": "https://learnprompting.org/ko/docs/basics/few_shot", "type": "tutorial"}, {"title": "What is Few-Shot Prompting? – IBM", "url": "https://www.ibm.com/think/topics/few-shot-prompting", "type": "blog"}],
   videos:[{"title": "Deep Dive into LLMs – Andrej Karpathy", "id": "7xTGNNLPyMI", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'transformer',t:'트랜스포머',en:'Transformer',c:'model',h:2,tags:['아키텍처','attention'],
   sum:'2017년 구글 연구팀이 발표한 셀프 어텐션 기반 신경망 아키텍처로, 현대 모든 LLM과 이미지 및 음성 AI의 근간이 됐다.',
   det:`<h4>트랜스포머의 등장</h4><p>2017년 구글의 <strong>Attention Is All You Need</strong> 논문에서 소개됐다. 이전의 RNN은 순서대로 처리해야 해 병렬화가 불가능했고, 문장이 길어지면 앞부분을 잊었다. 트랜스포머는 셀프 어텐션으로 입력 전체를 한꺼번에 처리한다.</p><h4>실제 활용과 현재 위상</h4><p>2026년 현재 사실상 모든 최첨단 AI의 기반이다. 언어 모델은 물론, OpenAI의 DALL-E와 Sora, Tesla의 FSD 자율주행, AlphaFold 2 단백질 구조 예측도 트랜스포머를 사용한다. 다만 계산 복잡도가 시퀀스 길이의 제곱에 비례하여 Mamba 등 대안 연구도 활발하다.</p>`,
   rel:['llm','embedding'],
   refs:[{"title": "Attention Is All You Need (원 논문) – arXiv", "url": "https://arxiv.org/abs/1706.03762", "type": "paper"}, {"title": "The Illustrated Transformer – Jay Alammar", "url": "https://jalammar.github.io/illustrated-transformer/", "type": "blog"}, {"title": "Transformer – Google Research Blog", "url": "https://research.google/blog/transformer-a-novel-neural-network-architecture-for-language-understanding/", "type": "official"}],
   videos:[{"title": "Transformers – 3Blue1Brown", "id": "wjZofJX0v4M", "lang": "en"}, {"title": "Attention in Transformers – 3Blue1Brown", "id": "eMlx5fFNoYc", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'tokenization',t:'토큰화',en:'Tokenization',c:'model',h:2,tags:['전처리','BPE'],
   sum:'텍스트를 LLM이 처리할 수 있는 최소 단위인 토큰으로 분할하는 과정으로, 분할 방식에 따라 언어 이해 능력과 처리 비용이 달라지는 핵심 전처리 단계다.',
   det:`<h4>토큰화란</h4><p>텍스트를 정수 ID 시퀀스로 변환하는 과정이다. BPE(Byte Pair Encoding)가 가장 널리 쓰이며, SentencePiece는 한국어, 일본어, 중국어 등 비공백 언어에 유리하다.</p><h4>토큰화와 비용, 언어 불평등</h4><p>영어 1,000단어는 약 750토큰이지만, 한국어 동일 분량은 더 많은 토큰을 소비해 비용이 높아진다. Meta는 Llama 2의 3만 2천 개에서 Llama 3의 12만 8천 개로 어휘 사전을 4배 확장해 비영어권 토큰 효율을 높였다. 토큰화 설계는 어느 언어 사용자가 공정한 비용으로 AI를 사용할 수 있는지에 영향을 미치는 형평성 문제이기도 하다.</p>`,
   rel:['llm','context-window'],
   refs:[{"title": "LLM Tokenization – Prompt Engineering Guide", "url": "https://www.promptingguide.ai/research/llm-tokenization", "type": "tutorial"}, {"title": "토큰화 – WikiDocs (한국어)", "url": "https://wikidocs.net/21698", "type": "tutorial"}],
   videos:[{"title": "Let's build the GPT Tokenizer – Andrej Karpathy", "id": "zduSFxRajkE", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'rlhf',t:'RLHF',en:'RL from Human Feedback',c:'model',h:2,tags:['강화학습','정렬'],
   sum:'인간 평가자의 선호도 데이터로 보상 모델을 학습시킨 뒤 강화학습으로 LLM을 인간의 의도에 맞게 정렬하는 기법으로, 현대 상용 LLM 대부분의 핵심 학습 방식이다.',
   det:`<h4>RLHF의 등장 배경</h4><p>사전 학습된 LLM은 다음 토큰 예측만 학습하므로 인간이 원하는 응답과 단순 텍스트 생성을 구분 못 한다. RLHF는 인간 피드백을 학습 신호로 삼아 모델을 유용하고, 무해하고, 정직한 방향으로 정렬한다. 1.3B InstructGPT가 175B GPT-3보다 선호받아 업계에 충격을 줬다.</p><h4>실제 적용 현황</h4><p>ChatGPT, Gemini, Claude, Llama 모두 RLHF를 사용한다. 2025년 기준 기업의 70%가 채택했다. DPO는 보상 모델 없이 직접 학습시켜 구현이 단순하고, RLAIF(LLM이 피드백 제공)는 비용이 인간 피드백의 1/100 이하로 대규모 정렬에 기본 방법이 됐다.</p>`,
   rel:['fine-tuning','llm'],
   refs:[{"title": "Illustrating RLHF – Hugging Face Blog", "url": "https://huggingface.co/blog/rlhf", "type": "blog"}, {"title": "A Survey of RLHF – arXiv", "url": "https://arxiv.org/abs/2312.14925", "type": "paper"}],
   videos:[{"title": "Deep Dive into LLMs – Andrej Karpathy", "id": "7xTGNNLPyMI", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'in-context-learning',t:'인컨텍스트 러닝',en:'In-Context Learning',c:'model',h:2,tags:['추론시학습'],
   sum:'모델 가중치를 수정하지 않고 프롬프트 안에 예시와 지시만 제공해 LLM이 새 작업을 즉시 수행하게 하는 능력으로, 파인튜닝 없이 다양한 용도에 적용하는 핵심 기법이다.',
   det:`<h4>인컨텍스트 러닝이란</h4><p>프롬프트 내에 입출력 예시를 제시하여 모델이 패턴을 파악하고 올바른 출력을 생성하게 하는 방식이다. 대화가 끝나면 모델은 원래 상태로 돌아간다. GPT-3의 2020년 논문에서 처음 보고됐다.</p><h4>실제 활용 사례</h4><p>Nature Communications 연구에 따르면 인컨텍스트 러닝만으로 병리 이미지 분류에서 전용 학습 신경망과 동등한 성능을 보였다. 파인튜닝에 수백만 원이 들 수 있지만 잘 설계된 퓨샷 프롬프트는 즉시 유사한 성능을 낼 수 있다. 번역, 감성 분석, 코드 변환 업무에서 프롬프트 라이브러리를 구축해 재사용하는 패턴이 보편화되고 있다.</p>`,
   rel:['few-shot','llm'],
   refs:[{"title": "A Survey on In-context Learning – EMNLP 2024", "url": "https://aclanthology.org/2024.emnlp-main.64/", "type": "paper"}, {"title": "ICL – AI·ML 사전 (WikiDocs, 한국어)", "url": "https://wikidocs.net/237982", "type": "tutorial"}],
   videos:[{"title": "Deep Dive into LLMs – Andrej Karpathy", "id": "7xTGNNLPyMI", "lang": "en"}],
   updated:'2026-04-01'},

  {id:'api-gateway',t:'AI API 게이트웨이',en:'AI API Gateway',c:'infra',h:2,tags:['라우팅','비용관리'],
   sum:'여러 LLM 공급자에 대한 요청을 중앙에서 관리하며 라우팅, 폴백, 비용 통제를 단일 레이어로 처리하는 인프라 컴포넌트다.',
   det:`<h4>필요한 이유</h4><p>LLM API는 응답 지연이 길고 비용이 토큰 단위로 누적되며 공급자마다 형식이 다르다. AI 게이트웨이는 모든 LLM 트래픽의 단일 진입점으로 라우팅, 폴백, 캐싱, 감사 로그를 중앙에서 집행한다.</p><h4>실제 활용 사례</h4><p>Kong은 2024년 최초의 전용 AI 게이트웨이를 출시, Portkey 대비 228% 높은 처리량을 기록했다. 폴백 라우팅으로 GPT-4o 실패 시 Claude로 자동 전환해 서비스를 유지한다. 시맨틱 캐싱은 동일한 질문에 이전 응답을 재사용해 비용을 30~60% 절감한다. 멀티모델 기업들은 간단한 작업은 소형 모델, 복잡한 추론은 대형 모델로 자동 분기하는 지능형 라우팅을 구현하고 있다.</p>`,
   rel:['llm','eval'],
   refs:[{"title": "Kong AI Gateway – Official Docs", "url": "https://docs.konghq.com/gateway/latest/ai-gateway/", "type": "official"}, {"title": "LiteLLM Proxy – Official Docs", "url": "https://docs.litellm.ai/docs/simple_proxy", "type": "official"}, {"title": "API Gateway vs AI Gateway – Kong Blog", "url": "https://konghq.com/blog/learning-center/api-gateway-vs--ai-gateway", "type": "blog"}],
   videos:[],

// State
let cat = 'all', q = '';

function render() {
  let list = D.filter(e => {
    if (cat !== 'all' && e.c !== cat) return false;
    if (!q) return true;
    const s = q.toLowerCase();
    return e.t.toLowerCase().includes(s) || e.en.toLowerCase().includes(s) || e.tags.some(t=>t.includes(s));
  }).sort((a,b) => b.h - a.h || a.t.localeCompare(b.t));

  const g = document.getElementById('grid');
  if (!list.length) { g.innerHTML = '<div class="empty">검색 결과 없음</div>'; return; }

  g.innerHTML = list.map(e => {
    const dots = [1,2,3,4,5].map(i => `<div class="heat-dot${i<=e.h?' on':''}"></div>`).join('');
    return `<div class="card" onclick="open_m('${e.id}')">
      <div class="card-cat">${CATS[e.c]}</div>
      <div class="card-heat">${dots}</div>
      <div class="card-keyword">${e.t}</div>
    </div>`;
  }).join('');
}

// Filters
(function(){
  const f = document.getElementById('filters');
  f.innerHTML = `<button class="f on" data-c="all">전체</button>` +
    Object.entries(CATS).map(([k,v])=>`<button class="f" data-c="${k}">${v}</button>`).join('');
  f.addEventListener('click', e => {
    const b = e.target.closest('.f');
    if (!b) return;
    f.querySelectorAll('.f').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    cat = b.dataset.c;
    render();
  });
})();

// Search
document.getElementById('q').addEventListener('input', e => { q = e.target.value.trim(); render(); });

// Modal
function open_m(id) {
  const e = D.find(x=>x.id===id);
  if (!e) return;
  const rels = (e.rel||[]).map(r=>D.find(x=>x.id===r)).filter(Boolean);
  document.getElementById('modal').innerHTML = `
    <button class="modal-close" onclick="close_m()">✕</button>
    <div class="modal-cat">${CATS[e.c]}</div>
    <div class="modal-title">${e.t}</div>
    <div class="modal-en">${e.en}</div>
    <div class="modal-heat">
      <span>Heat</span>
      <div class="pips">${[1,2,3,4,5].map(i=>`<div class="pip${i<=e.h?' on':''}"></div>`).join('')}</div>
      <span>${HEAT[e.h]}</span>
    </div>
    <div class="modal-body"><p>${e.sum}</p>${e.det}</div>
    ${e.tags.length?`<div class="modal-tags">${e.tags.map(t=>`<span onclick="document.getElementById('q').value='${t}';q='${t}';close_m();render()">#${t}</span>`).join('')}</div>`:''}
    ${(e.refs&&e.refs.length)||( e.videos&&e.videos.length)?`<div class="modal-refs">
      ${e.refs&&e.refs.length?`<h4>레퍼런스</h4>${e.refs.map(r=>`<a href="${r.url}" target="_blank" rel="noopener">${r.title}<span class="ref-type">${r.type}</span></a>`).join('')}`:''}
      ${e.videos&&e.videos.length?`<div class="modal-videos"><h4>영상</h4>${e.videos.map(v=>`<a href="https://www.youtube.com/watch?v=${v.id}" target="_blank" rel="noopener"><span class="yt-icon">▶</span>${v.title}<span class="vid-lang">${v.lang}</span></a>`).join('')}</div>`:''}</div>`:''}
    ${rels.length?`<div class="modal-related"><h4>관련 키워드</h4><div class="rel-links">${rels.map(r=>`<span class="rel-link" onclick="open_m('${r.id}')">${r.t}</span>`).join('')}</div></div>`:''}
  `;
  document.getElementById('ov').classList.add('open');
  document.body.style.overflow='hidden';
}

function close_m() {
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow='';
}

document.getElementById('ov').addEventListener('click', e => { if(e.target===e.currentTarget) close_m(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') close_m(); });

render();
</script>
</body>
</html>
